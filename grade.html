<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOTE Department</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="top-bar">
        <img src="images/logo.png" class="logo" alt="IOTE Logo">


        <div class="title-box">
            <div class="title">DEPARTMENT OF IOT AND<br>INFORMATION ENGINEERING</div>
            <div class="subtitle">King Mongkut's Institute of Technology Ladkrabang</div>
        </div>

        
            <div class="search-box">
    <input type="text" placeholder="Search...">
    <span class="search-icon">🔍</span>
</div>

            <!-- Hamburger -->
            <div class="hamburger" onclick="toggleMenu()">☰</div>
        </div>
    </div>

    <!-- Navigation bar -->
    <!-- Side Menu Overlay -->
<nav class="menu">
    <a href="#" class="active">HOME</a>
    <a href="#">ABOUT IOTE ▼ </a>
    <a href="#">ACADEMICS ▼ </a>
    <a href="#">ADMISSION ▼ </a>
    <a href="#">FACULTY ▼ </a>
    <a href="#">STUDENT SERVICES ▼ </a>
</nav>

    <div class="side-menu" id="menu">

    <div class="menu-header">
        <input type="text" placeholder="Search">
        <span class="close-btn" onclick="toggleMenu()">✕</span>
    </div>

    <div class="menu-links">
        <a href="#">HOME ></a>
        <a href="#">ABOUT IOTE ></a>
        <a href="#">ACADEMICS ></a>
        <a href="#">ADMISSION ></a>
        <a href="#">FACULTY ></a>
        <a href="#">STUDENT SERVICES ></a>
    </div>

    <div class="menu-footer">
        DEPARTMENT OF IOT AND<br>
        INFORMATION ENGINEERING
    </div>

</div>
</header>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("show");
}
</script>

<script>
    // เปลี่ยน active ของเมนู
    document.querySelectorAll('.menu a, .menu .dropdown').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.menu .active').forEach(el => {
                el.classList.remove('active');
            });
            this.classList.add('active');
        });
    });

   

</script>


</body>
</html>
